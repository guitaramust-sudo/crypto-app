name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          # Указываем путь к package.json, если он в подпапке
          cache-dependency-path: EcovtorresursNN/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: EcovtorresursNN

      - name: Build
        run: npm run build
        working-directory: EcovtorresursNN

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Теперь мы точно знаем, где лежит результат сборки
          path: "EcovtorresursNN/dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
